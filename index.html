<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESE Civil Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'DM Sans',sans-serif;
background:#08090E;
color:white;
padding:20px;
min-height:100vh;
}

h1{
font-size:28px;
font-weight:900;
margin-bottom:10px;
}

.sub{
color:#6B7280;
margin-bottom:30px;
}

.grid{
display:grid;
gap:20px;
}

.card{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
border-radius:18px;
padding:24px;
text-decoration:none;
color:white;
transition:0.3s;
}

.card:hover{
transform:translateY(-4px);
border-color:#6366F1;
}

.icon{
font-size:40px;
margin-bottom:14px;
}

.card h2{
font-size:20px;
margin-bottom:8px;
}

.card p{
font-size:14px;
color:#9CA3AF;
line-height:1.5;
}
</style>
</head>

<body>

<div id="topbar" style="position:sticky;top:0;z-index:999;display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#111827;border-bottom:1px solid rgba(255,255,255,0.08);">

<div id="userName" style="font-size:13px;font-weight:700;color:white;">
Not Logged In
</div>

<button id="loginBtn" style="background:#6366F1;color:white;border:none;padding:10px 16px;border-radius:10px;font-weight:700;cursor:pointer;">
Login with Google
</button>

</div>


<h1>ESE Civil Engineering Dashboard</h1>

<div class="sub">
Track syllabus, chapters and revisions easily.
</div>

<div class="grid">

<a class="card" href="gs-planner.html">
<div class="icon">📘</div>
<h2>GS Paper 1 Planner</h2>
<p>Track General Studies & Aptitude preparation.</p>
</a>

<a class="card" href="civil-paper2.html">
<div class="icon">🏗️</div>
<h2>Civil Paper 2 Planner</h2>
<p>Track Civil Engineering subject completion.</p>
</a>

<a class="card" href="revision-chart.html">
<div class="icon">📋</div>
<h2>Revision Tracker</h2>
<p>Track multiple revisions visually.</p>
</a>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBXuhaiC2uIZnIF5KVHIVRljzHyN7O5SEA",
  authDomain: "tracker-6629e.firebaseapp.com",
  projectId: "tracker-6629e",
  storageBucket: "tracker-6629e.firebasestorage.app",
  messagingSenderId: "811549120359",
  appId: "1:811549120359:web:9af3d850a5eb9096ca41c2",
  measurementId: "G-TL0ZDG45RT"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

const loginBtn = document.getElementById('loginBtn');
const userName = document.getElementById('userName');

let currentUser = null;

loginBtn?.addEventListener('click', async () => {

  if(currentUser){
    await signOut(auth);
    return;
  }

  try {
    await signInWithPopup(auth, provider);
  } catch(err){
    alert(err.message);
  }

});

onAuthStateChanged(auth, async (user) => {

  if(user){

    currentUser = user;

    if(userName) userName.textContent = user.displayName;

    if(loginBtn) loginBtn.textContent = 'Logout';

    await loadCloudData();

  } else {

    currentUser = null;

    if(userName) userName.textContent = 'Not Logged In';

    if(loginBtn) loginBtn.textContent = 'Login with Google';
  }

});

async function saveCloudData(){

  if(!currentUser || typeof progress === 'undefined') return;

  try {

    const ref = doc(db, 'users', currentUser.uid);

    await setDoc(ref, {
      progress
    });

  } catch(err){
    console.log(err);
  }

}

async function loadCloudData(){

  if(!currentUser) return;

  try {

    const ref = doc(db, 'users', currentUser.uid);

    const snap = await getDoc(ref);

    if(snap.exists()){

      const data = snap.data();

      if(data.progress){

        progress = data.progress;

        if(typeof renderAll === 'function') renderAll();
        if(typeof render === 'function') render();
        if(typeof updateOverall === 'function') updateOverall();

      }

    }

  } catch(err){
    console.log(err);
  }

}

if (typeof saveProgress === 'function') {
  const originalSaveProgress = saveProgress;

  saveProgress = function(p){

    originalSaveProgress(p);

    saveCloudData();

  }
}

</script>

</body>
</html>
